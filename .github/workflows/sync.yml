name: Sync YouTube feeds
on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch: {}
  push:
    paths:
      - "channels.json"

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_OWNER: ${{ github.repository_owner }}
          PAGES_BASE: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: python scripts/sync.py
      - name: Commit feed + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml state.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "sync: update feed [skip ci]"
            git push
          fi
