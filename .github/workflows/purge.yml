name: Purge old MP3s
on:
  schedule:
    - cron: "30 3 * * *"   # daily 03:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run purge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_OWNER: ${{ github.repository_owner }}
          PAGES_BASE: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: python scripts/purge.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml state.json
          if git diff --cached --quiet; then
            echo "no purges"
          else
            git commit -m "purge: cleanup old assets [skip ci]"
            git push
          fi
